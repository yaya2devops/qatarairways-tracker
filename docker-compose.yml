services:
  tracker:
    image: ghcr.io/${GITHUB_REPOSITORY:-msamoeed/qatarairways-tracker}:latest
    restart: unless-stopped
    ports:
      - "7432:3000"
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/tracker.db
    volumes:
      - tracker-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.scope=qatarairways-tracker"

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Check for new images every 5 minutes
      WATCHTOWER_POLL_INTERVAL: 300
      # Only watch containers in this compose project
      WATCHTOWER_SCOPE: qatarairways-tracker
      # Send a notification email when an update is applied (optional)
      WATCHTOWER_NOTIFICATIONS: email
      WATCHTOWER_NOTIFICATION_EMAIL_FROM: ${EMAIL_FROM}
      WATCHTOWER_NOTIFICATION_EMAIL_TO: ${EMAIL_TO}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER: ${EMAIL_HOST}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT: ${EMAIL_PORT}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER: ${EMAIL_USER}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD: ${EMAIL_PASS}
    labels:
      - "com.centurylinklabs.watchtower.scope=qatarairways-tracker"

volumes:
  tracker-data:
